<div class="panel">
  <h2>Add medicine</h2>

  <div class="message error" *ngIf="error">
    {{ error }}
  </div>

  <form [formGroup]="medicineForm" (ngSubmit)="save()">
    <div class="form-grid">
      
      <div class="field full">
        <label>Full name</label>
        <input type="text" formControlName="fullName" />
        <div *ngIf="submitted && medicineForm.get('fullName')?.invalid" class="text-danger">
          Full Name is required.
        </div>
      </div>
      
      <div class="field full">
        <label>Notes</label>
        <textarea formControlName="notes"></textarea>
      </div>
      
      <div class="field">
        <label>Expiry date</label>
        <input type="date" formControlName="expiryDate" />
        <div *ngIf="submitted && medicineForm.get('expiryDate')?.invalid" class="text-danger">
          Expiry Date is required.
        </div>
      </div>
      
      <div class="field">
        <label>Quantity</label>
        <input type="number" formControlName="quantity" />
        <div *ngIf="submitted && medicineForm.get('quantity')?.invalid" class="text-danger">
          Valid quantity is required.
        </div>
      </div>
      
      <div class="field">
        <label>Price</label>
        <input type="number" step="0.01" formControlName="price" />
        <div *ngIf="submitted && medicineForm.get('price')?.invalid" class="text-danger">
          Valid price is required.
        </div>
      </div>
      
      <div class="field">
        <label>Brand</label>
        <input type="text" formControlName="brand" />
        <div *ngIf="submitted && medicineForm.get('brand')?.invalid" class="text-danger">
          Brand is required.
        </div>
      </div>
      
    </div>
    
    <button class="btn btn-primary" type="submit">Save medicine</button>
  </form>
</div>
