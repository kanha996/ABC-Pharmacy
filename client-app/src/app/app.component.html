<div class="dashboard-wrapper">
  
  <header class="app-header">
    <div class="brand-title">
      <span class="icon-plus">+</span>
      <div>
        <h1>ABC Pharmacy Medicines</h1>
        <p class="subtitle">Single page app with Web API, JavaScript UI, JSON storage, and medicine sales tracking.</p>
      </div>
    </div>
  
  </header>

  <div class="dashboard-grid">
    
    <div class="grid-left">
      <app-medicine-list #inventoryList></app-medicine-list>
      <app-sales-entry (saleRecorded)="inventoryList.loadMedicines()"></app-sales-entry>
    </div>

    <div class="grid-right">
      <app-add-medicine (medicineAdded)="inventoryList.loadMedicines()"></app-add-medicine>
      
    </div>

  </div>
</div>
